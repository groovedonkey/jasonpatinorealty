services:
  - type: web
    name: jasonpatino-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jasonpatino-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://jasonpatino.com,http://localhost:8080
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false

databases:
  - name: jasonpatino-db
    plan: free
    region: ohio
